<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="arcGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#9D50BB;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#00D2FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7FFFEF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0A18;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#020205;stop-opacity:1" />
    </linearGradient>
    <filter id="arcGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="22" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="textGlow" x="-30%" y="-80%" width="160%" height="360%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="1024" height="1024" rx="200" fill="url(#bgGrad)" />

  <!-- 背景装飾 同心円（控えめ） -->
  <circle cx="512" cy="560" r="380" fill="none" stroke="rgba(0,210,255,0.05)" stroke-width="1.5" />
  <circle cx="512" cy="560" r="240" fill="none" stroke="rgba(0,210,255,0.05)" stroke-width="1.5" />

  <!-- アーク トラック（背景） -->
  <path d="M 162,730 A 350,350 0 1 1 862,730"
    fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="56" stroke-linecap="round" />

  <!-- アーク（グロー効果） -->
  <path d="M 162,730 A 350,350 0 1 1 720,320"
    fill="none" stroke="url(#arcGrad)" stroke-width="56" stroke-linecap="round"
    filter="url(#arcGlow)" opacity="0.7" />

  <!-- アーク（メイン） -->
  <path d="M 162,730 A 350,350 0 1 1 720,320"
    fill="none" stroke="url(#arcGrad)" stroke-width="44" stroke-linecap="round" />

  <!-- 先端 ドット -->
  <circle cx="720" cy="320" r="32" fill="#00D2FF" filter="url(#arcGlow)" />
  <circle cx="720" cy="320" r="20" fill="#ffffff" />

  <!-- 中央 スコア表示エリア -->
  <circle cx="512" cy="570" r="168" fill="rgba(0,210,255,0.06)" stroke="rgba(0,210,255,0.45)" stroke-width="5" />

  <!-- スコア 値シンボル（★★★ 3つ星） -->
  <!-- 星1 -->
  <g transform="translate(370, 572)" filter="url(#softGlow)">
    <polygon points="0,-48 11,-16 46,-16 19,6 29,38 0,20 -29,38 -19,6 -46,-16 -11,-16"
      fill="#FFC107" opacity="1" />
  </g>
  <!-- 星2（中央・大きめ） -->
  <g transform="translate(512, 542)" filter="url(#arcGlow)">
    <polygon points="0,-60 13,-19 56,-19 24,7 36,48 0,24 -36,48 -24,7 -56,-19 -13,-19"
      fill="#FFC107" />
  </g>
  <!-- 星3 -->
  <g transform="translate(654, 572)" filter="url(#softGlow)">
    <polygon points="0,-48 11,-16 46,-16 19,6 29,38 0,20 -29,38 -19,6 -46,-16 -11,-16"
      fill="#FFC107" opacity="1" />
  </g>

  <!-- SCORE VAULT テキスト（グロー付き・高視認性） -->
  <!-- グロー レイヤー -->
  <text x="512" y="692" font-family="Arial Black, Arial, sans-serif" font-size="58" font-weight="900"
    fill="url(#arcGrad)" text-anchor="middle" letter-spacing="6"
    filter="url(#arcGlow)" opacity="0.9">SCORE VAULT</text>
  <!-- メイン テキスト -->
  <text x="512" y="692" font-family="Arial Black, Arial, sans-serif" font-size="58" font-weight="900"
    fill="#ffffff" text-anchor="middle" letter-spacing="6"
    filter="url(#textGlow)" opacity="0.95">SCORE VAULT</text>

  <!-- 下部グロー -->
  <ellipse cx="512" cy="840" rx="300" ry="22" fill="url(#arcGrad)" opacity="0.20" filter="url(#arcGlow)" />
</svg>
